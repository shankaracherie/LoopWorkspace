name: Keep Nightscout Awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Nightscout
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cgm-remote-monitor-4myw.onrender.com/api/v1/status.json)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Nightscout is up!"
              exit 0
            fi
            sleep 10
          done
          echo "Nightscout did not respond after 2 minutes"
          exit 1
